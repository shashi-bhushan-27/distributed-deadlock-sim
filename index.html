<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Distributed Deadlock Detection Simulation</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.63.1/build/stlite.css" />
  </head>
  <body>
    <div id="root"></div>
    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.63.1/build/stlite.js"></script>
    <script>
      stlite.mount(
        {
          requirements: ["networkx", "simpy", "matplotlib", "pandas"],
          entrypoint: "app.py",
          files: {
            "app.py": {
              url: "./app.py"
            },
            "simulation.py": {
              url: "./simulation.py"
            }
          }
        },
        document.getElementById("root")
      );
    </script>
  </body>
</html>
